name: Submit to stores

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx wxt prepare
      - run: npm test
      - name: Check tag matches package.json version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $VERSION"
            exit 1
          fi
      - run: npm run zip
      - run: npm run zip:firefox
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            .output/flyfree-glide-${{ github.ref_name }}-chrome.zip
            .output/flyfree-glide-${{ github.ref_name }}-firefox.zip
      - name: Submit to Chrome Web Store and Firefox AMO
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npx wxt submit \
            --chrome-zip .output/flyfree-glide-$VERSION-chrome.zip \
            --firefox-zip .output/flyfree-glide-$VERSION-firefox.zip \
            --firefox-sources-zip .output/flyfree-glide-$VERSION-sources.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
