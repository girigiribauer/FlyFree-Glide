name: Submit to stores

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      store:
        description: 'Which store to submit to'
        type: choice
        options:
          - both
          - chrome
          - firefox
        default: both

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx wxt prepare
      - run: npm test
      - name: Resolve version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Check tag matches package.json version
        if: github.event_name == 'push'
        run: |
          if [ "${{ steps.version.outputs.version }}" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version ${{ steps.version.outputs.version }}"
            exit 1
          fi
      - run: npm run zip
      - run: npm run zip:firefox
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            .output/flyfree-glide-${{ steps.version.outputs.version }}-chrome.zip
            .output/flyfree-glide-${{ steps.version.outputs.version }}-firefox.zip
      - name: Submit to Chrome Web Store
        if: github.event_name == 'push' || github.event.inputs.store == 'both' || github.event.inputs.store == 'chrome'
        run: |
          npx wxt submit \
            --chrome-zip .output/flyfree-glide-${{ steps.version.outputs.version }}-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      - name: Submit to Firefox AMO
        if: github.event_name == 'push' || github.event.inputs.store == 'both' || github.event.inputs.store == 'firefox'
        run: |
          npx wxt submit \
            --firefox-zip .output/flyfree-glide-${{ steps.version.outputs.version }}-firefox.zip \
            --firefox-sources-zip .output/flyfree-glide-${{ steps.version.outputs.version }}-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
